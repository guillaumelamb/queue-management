name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        id: restore
        shell: pwsh
        continue-on-error: true
        run: dotnet restore QueueManagement.sln

      - name: Build
        id: build
        if: always() && steps.restore.outcome == 'success'
        shell: pwsh
        continue-on-error: true
        run: dotnet build QueueManagement.sln --configuration Release --no-restore

      - name: Test
        id: test
        if: always() && steps.restore.outcome == 'success' && steps.build.outcome == 'success'
        shell: pwsh
        continue-on-error: true
        run: dotnet test QueueManagement.sln --configuration Release --no-build --filter "Category!=Benchmark" --logger "trx;LogFileName=test-results.trx" --results-directory artifacts/test-results

      - name: Run benchmark tests
        id: benchmark
        if: always() && steps.restore.outcome == 'success' && steps.build.outcome == 'success'
        shell: pwsh
        continue-on-error: true
        run: dotnet test QueueManagement.sln --configuration Release --no-build --filter "Category=Benchmark" --logger "trx;LogFileName=benchmark-tests.trx" --results-directory artifacts/benchmark-test-results

      - name: Generate HTML test report
        if: always()
        shell: pwsh
        run: |
          ./.github/scripts/New-TestReport.ps1 `
            -ResultsDir artifacts `
            -OutputDir artifacts/site `
            -Repository '${{ github.repository }}' `
            -Branch '${{ github.ref_name }}' `
            -Commit '${{ github.sha }}' `
            -RunNumber '${{ github.run_number }}' `
            -WorkflowUrl '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' `
            -RestoreOutcome '${{ steps.restore.outcome }}' `
            -BuildOutcome '${{ steps.build.outcome }}' `
            -TestOutcome '${{ steps.test.outcome }}' `
            -BenchmarkOutcome '${{ steps.benchmark.outcome }}'

      - name: Upload raw test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            artifacts/test-results
            artifacts/benchmark-test-results
          if-no-files-found: ignore

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/site

      - name: Add CI summary
        if: always()
        shell: pwsh
        run: |
          $publicationStatus = if ('${{ github.event_name }}' -eq 'push' -and '${{ github.ref_name }}' -eq '${{ github.event.repository.default_branch }}' -and '${{ github.event.repository.has_pages }}' -eq 'true') {
            'queued for GitHub Pages deployment'
          }
          elseif ('${{ github.event_name }}' -eq 'push' -and '${{ github.ref_name }}' -eq '${{ github.event.repository.default_branch }}') {
            'skipped because GitHub Pages is not enabled yet; enable it in repository Settings > Pages and choose GitHub Actions as the source'
          }
          else {
            'skipped because this is not a push to the default branch'
          }

          @"
          ## CI summary

          - Restore: `${{ steps.restore.outcome }}`
          - Build: `${{ steps.build.outcome }}`
          - Test: `${{ steps.test.outcome }}`
          - Benchmark tests: `${{ steps.benchmark.outcome }}`
          - Report publication: $publicationStatus
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Enforce pipeline result
        if: always()
        shell: pwsh
        run: |
          $failedSteps = @()

          if ('${{ steps.restore.outcome }}' -ne 'success') {
            $failedSteps += 'restore'
          }

          if ('${{ steps.build.outcome }}' -ne 'success') {
            $failedSteps += 'build'
          }

          if ('${{ steps.test.outcome }}' -ne 'success') {
            $failedSteps += 'test'
          }

          if ('${{ steps.benchmark.outcome }}' -ne 'success') {
            $failedSteps += 'benchmark'
          }

          if ($failedSteps.Count -gt 0) {
            throw "Failed steps: $($failedSteps -join ', ')"
          }

  deploy-report:
    name: Deploy test report
    if: always() && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && github.event.repository.has_pages == true
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add published link
        shell: pwsh
        run: |
          @"
          ## Published test report

          - Report URL: ${{ steps.deployment.outputs.page_url }}
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
